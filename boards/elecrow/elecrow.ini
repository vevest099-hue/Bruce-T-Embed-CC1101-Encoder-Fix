[env:elecrow-35Bv2_2]
extends = env:elecrow-35B
build_flags =
	${env:elecrow-35B.build_flags}
	-DCYD28_TouchR_CS=12
	-DTFT_MISO=33
	-DCYD28_TouchR_MISO=33
	-DTOUCH_CS=12
	-DDEVICE_NAME='"Elecrow 3.5B v2.2"'
build_unflags =
	-DCYD28_TouchR_CS=33
	-DCYD28_TouchR_MISO=12
	-DTFT_MISO=12
	-DTOUCH_CS=33
	-DDEVICE_NAME='"Elecrow 3.5B"'

[env:LAUNCHER_elecrow-35Bv2_2]
